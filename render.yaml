services:
  # Web Service - Flask Backend (app.py)
  - type: web
    name: atool-backend
    runtime: python
    region: oregon  # Choose: oregon, frankfurt, singapore (free tier available)
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    plan: free  # Free tier
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 10000  # Render uses port 10000
      - key: FLASK_ENV
        value: production
      - key: DEBUG
        value: False
      # envvault: ONE key decrypts the committed backend/.env.vault at startup.
      # Set its value in Render Dashboard (Environment tab) to the DOTENV_KEY URI
      # printed by:  python -m envvault encrypt backend/.env --environment production
      - key: DOTENV_KEY
        sync: false  # Value: dotenv://:key_<64-hex>@dotenv.org/vault/.env.vault?environment=production
    healthCheckPath: /health
    autoDeploy: true  # Auto-deploy on git push

  # Worker Service - Job Processor (job_worker_realtime.py)
  - type: worker
    name: atool-worker
    runtime: python
    region: oregon  # Same region as web service
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python job_worker_realtime.py
    plan: free  # Free tier
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      # envvault: ONE key decrypts the committed backend/.env.vault at startup.
      # Set its value in Render Dashboard (Environment tab) to the DOTENV_KEY URI
      # printed by:  python -m envvault encrypt backend/.env --environment production
      - key: DOTENV_KEY
        sync: false  # Value: dotenv://:key_<64-hex>@dotenv.org/vault/.env.vault?environment=production
      # Backend URL (will be set after web service deploys)
      - key: BACKEND_URL
        sync: false  # Format: https://atool-backend.onrender.com
      # PostgreSQL connection for LISTEN/NOTIFY (more stable than Realtime WebSocket)
      - key: DATABASE_URL
        sync: false  # Get from: Supabase Dashboard -> Settings -> Database -> Connection string (Session mode, port 5432). NOT 6543!
    autoDeploy: true
